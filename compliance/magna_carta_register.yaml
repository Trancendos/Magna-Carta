      - ISO27001 A.5.2
      - SOC2 CC1.1
      - SOC2 CC2.1
    verification_method: document_review
    last_reviewed: "2026-06-07"
    reviewer: "Trancendos"
    notes: "Staff acknowledgement tracking via HR/ISMS tooling TBD"

  - id: MC-007
    standard: "Magna Carta"
    title: "Architecture Evidence Pack"
    description: "Canonical as-built architecture, control-to-component mapping, and threat model must be maintained and referenced for audits instead of aspirational architecture documents."
    status: COMPLIANT
