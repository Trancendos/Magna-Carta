  - path: docs/compliance/EU-LEGISLATION-MONITORING.md
    check_id: MON-007
  - path: docs/compliance/ETSI-SAI-ALIGNMENT.md
    check_id: MON-007
  - path: docs/compliance/HARMONISED-STANDARDS-MONITORING.md
    check_id: MON-007

yaml_registers:
  - path: compliance/compliance_action_tracker.yaml
    check_id: MON-006
  - path: compliance/magna_carta_register.yaml
    check_id: MON-006
  - path: compliance/risk_register.yaml
    check_id: MON-006
  - path: compliance/supplier_dpa_register.yaml
    check_id: MON-006
  - path: compliance/tranc3_register_bridge.yaml
    check_id: MON-006
  - path: compliance/policy_attestation_register.yaml
    check_id: MON-006
  - path: compliance/health_check_history.yaml
    check_id: MON-006
  - path: compliance/frameworks_register.yaml
    check_id: MON-006
  - path: compliance/legislation_register.yaml
    check_id: MON-006
  - path: compliance/standards_watch.yaml
    check_id: MON-006
  - path: compliance/maintenance_monitor.yaml
    check_id: MON-006

weekly_cadence:
  check_id: MON-008
  max_gap_days: 7
  history: compliance/health_check_history.yaml

schema_validation:
  - check_id: MON-009
    register: compliance/compliance_action_tracker.yaml
    schema: compliance/schemas/compliance_action_tracker.schema.json
  - check_id: MON-009
    register: compliance/health_check_history.yaml
    schema: compliance/schemas/health_check_history.schema.json
  - check_id: MON-009
    register: compliance/risk_register.yaml
    schema: compliance/schemas/risk_register.schema.json
  - check_id: MON-009
    register: compliance/supplier_dpa_register.yaml
    schema: compliance/schemas/supplier_dpa_register.schema.json
  - check_id: MON-009
    register: compliance/magna_carta_register.yaml
    schema: compliance/schemas/magna_carta_register.schema.json
  - check_id: MON-009
    register: compliance/tranc3_register_bridge.yaml
    schema: compliance/schemas/tranc3_register_bridge.schema.json
  - check_id: MON-009
    register: compliance/policy_attestation_register.yaml
    schema: compliance/schemas/policy_attestation_register.schema.json
  - check_id: MON-009
    register: compliance/maintenance_monitor.yaml
    schema: compliance/schemas/maintenance_monitor.schema.json
  - check_id: MON-009
    register: compliance/frameworks_register.yaml
    schema: compliance/schemas/frameworks_register.schema.json
  - check_id: MON-009
    register: compliance/legislation_register.yaml
    schema: compliance/schemas/legislation_register.schema.json
  - check_id: MON-009
    register: compliance/standards_watch.yaml
    schema: compliance/schemas/standards_watch.schema.json

procedure_coverage:
  check_id: MON-010
  procedures_dir: docs/procedures
  cookbooks_dir: docs/cookbooks
  hymn_sheets_dir: docs/hymn-sheets
  code_pattern: "PROC-([A-Z]+-\\d+)"

index_drift_checks:
  - check_id: MON-004
    readme_path: README.md
    index_path: docs/policies/INDEX.md
    pattern: "Policy library index \\((\\d+) policies\\)"
    count_method: count_policy_files
  - check_id: MON-004
    readme_path: README.md
    index_path: docs/procedures/INDEX.md
    pattern: "Procedure library index \\((\\d+) procedures\\)"
    count_method: count_procedure_files

stale_review_patterns:
  - check_id: MON-002
    glob: "docs/compliance/*.md"
    patterns:
      - "Next review:\\s*\\*\\*\\s*(\\d{4}-\\d{2}-\\d{2})"
      - "\\*\\*Next review:\\*\\*\\s*(\\d{4}-\\d{2}-\\d{2})"
    max_age_days: 120

action_overdue:
  check_id: MON-003
  source: compliance/compliance_action_tracker.yaml
  statuses: ["Open", "In progress", "Blocked"]

cookbook_links:
  - check_id: MON-005
    index: docs/cookbooks/INDEX.md
    base_dir: docs/cookbooks
  - check_id: MON-005
    index: docs/hymn-sheets/INDEX.md
    base_dir: docs/hymn-sheets
