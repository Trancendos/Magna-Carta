    check_id: MON-001
  - path: docs/compliance/SYSTEMS-REGISTER.md
    check_id: MON-001
  - path: docs/governance/REVIEWERS-REGISTER.md
    check_id: MON-001
  - path: docs/governance/DOCUMENTATION-ARTIFACT-MODEL.md
    check_id: MON-007
  - path: docs/governance/COMPLIANCE-MAINTENANCE-PROGRAMME.md
    check_id: MON-007
  - path: docs/bibles/MAGNACARTA-GOVERNANCE-BIBLE.md
    check_id: MON-007
  - path: docs/schemas/REGISTER-SCHEMAS.md
    check_id: MON-007
  - path: docs/cookbooks/INDEX.md
    check_id: MON-005
  - path: docs/hymn-sheets/INDEX.md
    check_id: MON-005
  - path: docs/evidence/COMPLIANCE-HEALTH-LOG.md
    check_id: MON-007
  - path: scripts/weekly_compliance_health.sh
    check_id: MON-007
  - path: docs/bibles/PRIVACY-BIBLE.md
    check_id: MON-007
  - path: docs/bibles/SECURITY-BIBLE.md
    check_id: MON-007
  - path: docs/runbooks/RUN-OMB-001-Ombudsman-Escalation.md
    check_id: MON-007
  - path: docs/runbooks/RUN-PECR-001-Cookie-Deployment.md
    check_id: MON-007
  - path: docs/compliance/ASVS-GAP-CHECKLIST.md
    check_id: MON-007
  - path: docs/templates/TEMPLATE-FAIRNESS-TEST-REPORT.md
    check_id: MON-007
  - path: docs/templates/TEMPLATE-INTERNAL-AUDIT-REPORT.md
    check_id: MON-007
  - path: docs/compliance/OWASP-AI-EXCHANGE-ALIGNMENT.md
    check_id: MON-007
  - path: docs/compliance/AI-SECURITY-THREAT-MODEL.md
