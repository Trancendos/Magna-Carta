---
# Maintenance monitor configuration — drives compliance_health_check.py
# Owner: ISMS Lead
# Human-readable: docs/governance/COMPLIANCE-MAINTENANCE-PROGRAMME.md

meta:
  register_version: "1.0.0"
  owner: "ISMS Lead"
  last_updated: "2026-06-08"
  review_cycle: "quarterly"

settings:
  default_max_age_days: 120
  strict_exit_on_error: true

required_files:
  - path: docs/compliance/COMPLIANCE-COVERAGE-REGISTER.md
    check_id: MON-001
  - path: docs/compliance/STANDARDS-REGISTER.md
