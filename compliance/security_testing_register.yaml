---
# Security testing register — continuous (Layer B) vs annual external (Layer C)
# Owner: Security Ops
# Primary policy: docs/compliance/ZERO-COST-SECURITY-TOOLING.md
# Aikido appendix: docs/compliance/AIKIDO-SECURITY-TESTING-FRAMEWORK.md

meta:
  register_version: "1.1.0"
  owner: "Security Ops"
  last_updated: "2026-06-09"
  review_cycle: "quarterly"

schema:
  test_id: "SEC-### unique identifier"
  layer: "continuous | annual_external"
  status: "configured | active | pending_connection | owner_gate"

channels:
  - test_id: SEC-001
    name: "Aikido MCP — SAST and secrets feed (optional, deprioritised)"
    layer: continuous
    tool: aikido_full_scan
    mcp_server: Aikido
    cost_model: free_tier_no_cc
    zct_id: ZCT-011
    status: pending_connection
    mandatory: false
    frequency: "on_change_and_weekly"
    scope:
      - "Repository source (Python, YAML, shell, markdown with code fences)"
    remediation_procedure: docs/procedures/PROC-VUL-001-Vulnerability-Management.md
    notes: >
      Optional enhancement only; paid tiers and GitHub Action SAST gates are out of scope.
      Recommended alternative: SEC-006 OSS stack (100% free, no account).
      Mandatory baseline is SEC-002. pending_connection does not block Layer B.

  - test_id: SEC-006
    name: "OSS security stack — Aikido-free alternative"
    layer: continuous
    tool: scripts/run_oss_security_scans.sh
    installer: scripts/install_zero_cost_security_stack.sh
    cost_model: free_oss
    zct_ids:
      - ZCT-007
      - ZCT-008
      - ZCT-009
      - ZCT-010
      - ZCT-012
    mandatory: false
    status: configured
    frequency: "weekly_and_pre_release"
    tools:
      - gitleaks
      - bandit
      - semgrep
      - pip-audit
    remediation_procedure: docs/procedures/PROC-VUL-001-Vulnerability-Management.md
    notes: >
      100% free open-source scanners. Install via install_zero_cost_security_stack.sh.
      Skips gracefully when tools absent; SEC-002 still satisfies Layer B.

  - test_id: SEC-002
    name: "Local security testing script (mandatory zero-cost)"
    layer: continuous
    tool: scripts/run_security_testing.py
    cost_model: free_local_script
    zct_id: ZCT-004
    mandatory: true
    status: configured
    frequency: "weekly_and_pre_release"
    checks:
      - high_entropy_secret_patterns
      - private_key_pem_blocks
      - aws_access_key_id_pattern
      - committed_env_files
      - dangerous_shell_patterns
    remediation_procedure: docs/procedures/PROC-VUL-001-Vulnerability-Management.md

  - test_id: SEC-003
    name: "Compliance health — security-related MON checks"
    layer: continuous
    tool: scripts/compliance_health_check.py
    status: active
    frequency: weekly
    checks:
      - MON-014
      - MON-016
      - ASVS_gap_checklist_present

  - test_id: SEC-004
    name: "OWASP AI threat assessments (PROC-AI-003)"
    layer: continuous
    tool: docs/evidence/proc-ai-003/
    status: active
    frequency: "on_model_change"
    evidence_refs:
      - AST-2026-001
      - AST-2026-002
      - AST-2026-003

  - test_id: SEC-005
    name: "Annual external penetration test"
    layer: annual_external
    tool: third_party_crest_check
    status: owner_gate
    frequency: annual
    owner_action: ACT-005
    programme_doc: docs/evidence/PEN-TEST-PROGRAMME.md
    evidence_slot: docs/evidence/certifications/
    notes: "Owner commissions; upload report to certification vault when complete"

integration:
  zero_cost_policy: docs/compliance/ZERO-COST-SECURITY-TOOLING.md
  local_ci_runner: scripts/run_layer_b_local_ci.sh
  zero_cost_register: compliance/zero_cost_tooling_register.yaml
  oss_stack_runner: scripts/run_oss_security_scans.sh
  oss_stack_installer: scripts/install_zero_cost_security_stack.sh
  aikido:
    mcp_tools:
      - aikido_full_scan
      - aikido_issues_list
      - aikido_ignore_issue
    local_runner: scripts/run_security_testing.py
    when_mcp_unavailable: "Run SEC-002 and SEC-006 OSS stack; SEC-001 pending_connection does not reduce Layer B %"
    preferred_alternative: SEC-006

  compliance_frameworks:
    - OWASP ASVS — docs/compliance/ASVS-GAP-CHECKLIST.md
    - OWASP AI Exchange — docs/compliance/OWASP-AI-EXCHANGE-ALIGNMENT.md
    - PROC-VUL-001 — vulnerability management
    - HYMN-VUL-001 — triage checklist
